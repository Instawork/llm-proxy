# LLM Proxy Configuration
# This file configures rate limiting, cost tracking, and model-specific settings

# Production configuration

enabled: true

features:
  cost_tracking:
    enabled: true
    async: true
    workers: 8
    queue_size: 500
    flush_interval: 15
    transports:
      - type: "dynamodb"
        dynamodb:
          table_name: "llm-proxy-cost-tracking"
          region: "us-west-2"
      - type: "datadog"
        datadog:
          host: "localhost"
          port: "8125"
          namespace: "llm"
          tags: ["env:prod", "service:llm-proxy", "team:platform"]
          sample_rate: 1.0
      - type: "file"
        file:
          path: "./logs/cost-tracking-backup.jsonl"
  api_key_management:
    enabled: true
    table_name: "llm-proxy-api-keys"
    region: "us-west-2"
    # New keys are minted as "sk-<base>-<random>"; legacy "<base>-" / "<base>_" / "<base>:" keys still validate.
    key_prefix: "iw"
    provisioning:
      enabled: true
      openai:
        enabled: true
        project_id: "${LLM_PROXY_OPENAI_PROJECT_ID}"
      gemini:
        enabled: true
        gcp_project_id: "${LLM_PROXY_GCP_PROJECT_ID}"
      anthropic:
        enabled: true
        default_tier: metered
        tiers:
          metered: "${LLM_PROXY_ANTHROPIC_KEY_METERED}"
          elevated: "${LLM_PROXY_ANTHROPIC_KEY_ELEVATED}"
          unrestricted: "${LLM_PROXY_ANTHROPIC_KEY_UNRESTRICTED}"
  # Circuit breaker: enforce mode.  Retries transient failures (up to
  # max_transient_retries), fast-fails open circuits with a synthetic 503,
  # and counts retry contributions toward the failure window.
  #
  # ${REDIS_URL} is populated from a deployment-managed secret in the
  # ECS task definition; any transient Redis outage degrades the breaker
  # to per-instance best-effort (fail-open) rather than tripping the
  # proxy itself.
  circuit_breaker:
    enabled: true
    mode: "enforce"
    backend: "redis"
    redis:
      url: "${REDIS_URL}"
      db: 5
    failure_threshold: 5
    window_seconds: 120
    cooldown_seconds: 300
    max_transient_retries: 2
    max_rate_limit_retries: 2
    retry_contribution_mode: "on"
    # Bypass safety valve: callers without a fallback can set
    # X-LLM-Proxy-Bypass-Circuit (or ?llm_proxy_bypass_circuit=1) to opt
    # out of fast-fail.  Default is true; set to false to disable the
    # safety valve entirely once every caller has fallback logic wired up.
    bypass_allowed: true
    # Bypass-reason allowlist: only these values are emitted verbatim on
    # the `circuit.bypass` Datadog tag — anything else gets normalised to
    # `other`.  Keeps tag cardinality bounded against noisy callers and
    # standardises the dashboard vocabulary.  Comment out (or empty list)
    # to accept any well-formed reason during early rollout.
    bypass_reason_allowlist:
      - no_fallback_configured
      - manual_debug
      - final_retry_tier
      - force_real_upstream
    # Per-provider rollup: when this many distinct per-model breakers
    # open inside the rollup window, the entire provider is treated as
    # Open and ALL keys for it fast-fail.  Set to 0 to disable (in which
    # case behaviour matches per-model keying alone).  3 / 300s is the
    # recommended starting point for prod — high enough that a single
    # bad preview model doesn't trip wholesale enforcement, low enough
    # that a real Gemini/OpenAI/Anthropic outage does.
    per_provider_rollup_threshold: 3
    per_provider_rollup_window_seconds: 300
  rate_limiting:
    enabled: false
    backend: "redis"
    redis:
      url: "${REDIS_URL}"
      db: 4
    limits:
      requests_per_minute: 0
      tokens_per_minute: 0
      requests_per_day: 0
      tokens_per_day: 0
  pii_redact:
    enabled: false
    analyzer_url: "http://localhost:3000"
    fail_mode: "open"
    allow_per_key_override: false
  redact_api:
    enabled: true
    fail_mode: closed
    requests_per_minute: 120
  admin_dashboard:
    enabled: true
    # Real sign-in domain is injected at deploy time via the
    # LLM_PROXY_ADMIN_ALLOWED_DOMAIN env var (it takes precedence over this
    # value in auth.go). Keep the neutral placeholder here so no private
    # domain ships in the repo.
    allowed_domain: "example.com"
    users:
      dynamodb:
        table_name: "llm-proxy-admin-users"
        region: "us-west-2"
    rollups:
      enabled: true
      redis:
        url: "${REDIS_URL}"
        db: 6
      retention_days: 90
      history_days: 30
  history:
    backend: s3
    role: global
    streams: [cost, pii, usage, ratelimit]
    max_records: 1000
    max_bytes: 8388608
    max_age_seconds: 300
    gzip: true
    s3:
      bucket: instawork-llm-proxy-history
      prefix: llm-proxy
      region: us-west-2

# =============================================================================
# PROVIDER OVERRIDES
# =============================================================================
# Base config disables AWS Bedrock by default (see configs/base.yml).  Flip the
# override below — and confirm the calling service's IAM role has bedrock:Invoke* /
# Converse* grants for $AWS_REGION — to enable the SigV4 passthrough after
# staging validation.
# providers:
#   bedrock:
#     enabled: true
