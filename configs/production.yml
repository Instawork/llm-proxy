# LLM Proxy Configuration
# This file configures rate limiting, cost tracking, and model-specific settings

# Production configuration

enabled: true

features:
  cost_tracking:
    enabled: true
    async: true
    workers: 8
    queue_size: 500
    flush_interval: 15
    transports:
      - type: "dynamodb"
        dynamodb:
          table_name: "llm-proxy-cost-tracking"
          region: "us-west-2"
      - type: "datadog"
        datadog:
          host: "localhost"
          port: "8125"
          namespace: "llm"
          tags: ["env:prod", "service:llm-proxy", "team:platform"]
          sample_rate: 1.0
      - type: "file"
        file:
          path: "./logs/cost-tracking-backup.jsonl"
  api_key_management:
    enabled: true
    table_name: "llm-proxy-api-keys"
    region: "us-west-2"
  # Circuit breaker: shadow/observe-only rollout against the Finch-owned
  # Redis cluster.  The sidecar records counterfactual state + failure
  # counts in Redis (under the `llm:cb:` prefix, DB 5) but never retries
  # traffic, fast-fails, or synthesises 503s — operators can flip
  # `mode: enforce` once the would-trip rates look sane.
  #
  # ${REDIS_URL} is populated from the ML_CACHE_URL SSM secret in the
  # ECS task definition; any transient Redis outage degrades the breaker
  # to per-instance best-effort (fail-open) rather than tripping the
  # proxy itself.
  circuit_breaker:
    enabled: true
    mode: "log"
    backend: "redis"
    redis:
      url: "${REDIS_URL}"
      db: 5
    failure_threshold: 5
    window_seconds: 120
    cooldown_seconds: 300
    max_transient_retries: 2
    max_rate_limit_retries: 2
    retry_contribution_mode: "log"
  rate_limiting:
    enabled: false
