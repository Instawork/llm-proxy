# LLM Proxy Configuration
# This file configures rate limiting, cost tracking, and model-specific settings

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
enabled: true

# =============================================================================
# FEATURE TOGGLES
# =============================================================================

features:
  cost_tracking:
    enabled: false
    # Async mode enables background workers to process cost records
    # This improves request latency by not blocking on transport writes
    async: false # Enable async processing (default: false - synchronous)
    workers: 5 # Number of worker goroutines for async processing (default: 5)
    queue_size: 1000 # Size of the async processing queue (default: 1000)
    flush_interval: 15 # Interval in seconds to flush pending records (default: 15)
  rate_limiting:
    enabled: false
  # ---------------------------------------------------------------------------
  # Bring-your-own provider keys (raw sk-ant-/AIza/... passthrough)
  # ---------------------------------------------------------------------------
  byo_keys:
    enabled: true
  # ---------------------------------------------------------------------------
  # PII redaction (Presidio analyzer sidecar)
  # ---------------------------------------------------------------------------
# Off by default. When enabled, the proxy scrubs request bodies with
# Presidio and (by default) sends placeholder text to the upstream LLM.
# MASK-tier placeholders (<PERSON_1>) are restored in responses to the
# client; SEAL-tier placeholders stay opaque; REDACT-tier markers are
# one-way [REDACTED:TYPE] tokens.
  pii_redact:
    enabled: false
    # Sidecar URL. ECS: same task, localhost. Local dev: http://presidio:3000
    # over the docker-compose network.
    analyzer_url: ""
    # "open"   - log a warning and pass through unredacted on sidecar errors.
    # "closed" - abort the request with 503. Use only when regulatory cost
    #            of an unredacted log line outweighs availability.
    fail_mode: "open"
    # Presidio /analyze can take hundreds of ms (cold start, large bodies).
    # When pii_redact is on, prefer waiting for redaction over failing open early.
    timeout_ms: 3000
    # Extra /analyze budget per 100 KiB of request body. Large tool results
    # (Redshift table_acl, etc.) need headroom beyond the base timeout.
    timeout_ms_per_100kb: 1000
    timeout_ms_max: 30000
    analyze_concurrency: 4
    score_threshold: 0.5
    # Empty -> use redact.DefaultEntityTypes. Narrow this list to save
    # latency on known-safe payload shapes, never widen it here — the
    # in-code allowlist filters out anything that isn't already audited.
    # entity_types: ["US_SSN", "PERSON", "EMAIL_ADDRESS"]
    language: "en"
    # Bodies larger than this skip redaction with a WARN log (tagged
    # path / provider / body_bytes / max_body_bytes) and pass through
    # to the upstream LLM intact — no redacted copy is stashed in
    # context. 0 = use the middleware default of 1048576 bytes (1 MiB),
    # which fits virtually all chat / completions / embeddings shapes
    # and most vision payloads. Lower this only if sidecar latency
    # becomes a problem; raise it if the WARN counter trends up in
    # Datadog and you'd rather pay the redaction cost.
    max_body_bytes: 0
    allow_test_emails: true
    allow_per_key_override: false
    # Cache Presidio /analyze spans per content block (5 min TTL).
    # memory: per-task hot set; redis: shared across ECS tasks.
    # analyze_cache:
    #   enabled: true
    #   ttl_seconds: 300
    #   memory:
    #     enabled: true
    #     max_entries: 4096
    #   redis:
    #     enabled: true
    #     redis:
    #       url: "${REDIS_URL}"
    #       db: 7
    # wire_placeholders: true   # default when enabled — send <PERSON_1> upstream
    # default_allow_streaming: true  # per-key allow_streaming can force stream:false
  # ---------------------------------------------------------------------------
  # Client response gzip (opt-in; off by default)
  # ---------------------------------------------------------------------------
  # When enabled, non-streaming responses are gzip-compressed for clients that
  # sent Accept-Encoding: gzip. Upstream still receives plain bytes (PII restore
  # and token parsing operate on uncompressed wire data).
  # client_gzip:
  #   enabled: false
  # ---------------------------------------------------------------------------
  # Upstream provider HTTP transport
  # ---------------------------------------------------------------------------
  # How long the proxy waits for the first response header from an LLM provider
  # before returning 502. Must stay <= Cloudflare origin read timeout and the
  # dedicated ALB idle_timeout (typically 300s when aligned). Override per
  # provider with providers.<name>.response_header_timeout_seconds.
  upstream:
    response_header_timeout_seconds: 300
  # ---------------------------------------------------------------------------
  # Government ID gate (OCR sidecar + Presidio on embedded chat images)
  # ---------------------------------------------------------------------------
  id_gate:
    enabled: false
    ocr_sidecar_url: ""
    fail_mode: "open"
    score_threshold: 0.4
    timeout_ms: 30000
    max_body_bytes: 0
    max_image_bytes: 0
    # Images in one request are OCR'd + analyzed in parallel up to this many.
    # 0 -> default of 4. The OCR fleet bounds its own per-process load, so this
    # mainly cuts latency for multi-image requests.
    image_concurrency: 0
  # ---------------------------------------------------------------------------
  # Standalone POST /redact (Presidio one-way markers for hooks/tools)
  # ---------------------------------------------------------------------------
  redact_api:
    enabled: false
    # "closed" recommended for Cursor hooks — fail rather than pass PII through.
    # Empty fail_mode defaults to closed at startup. Open is rejected.
    fail_mode: "closed"
    requests_per_minute: 120  # per iw-* key; 0 = unlimited. Independent of features.rate_limiting.
    # dev only: skip iw-* auth when admin dev_bypass_login is also true.
    # dev_allow_unauthenticated: true
    max_body_bytes: 0
  admin_dashboard:
    enabled: false
    allowed_domain: "example.com"
    dev_cors_origin: "http://localhost:5173"
    # Admin emails allowed to create/update keys with PII redaction disabled on
    # a non-Bedrock provider. Ships empty (no one can bypass) — list the admins
    # here so roster changes don't require a code deploy.
    # pii_off_bypass_admins:
    #   - "admin@example.com"
    rollups:
      enabled: false
      redis:
        db: 6
      retention_days: 90
      history_days: 30
    users:
      dynamodb:
        region: "us-west-2"
        table_name: "llm-proxy-admin-users"
        auto_create_table: false
    editor_limits:
      max_daily_cost_limit_cents: 10000
    viewer_limits:
      personal_monthly_cost_limit_cents: 2000
  # ---------------------------------------------------------------------------
  # Row history (gzipped JSONL archive — independent of Redis rollups)
  # ---------------------------------------------------------------------------
  # Off by default. When enabled, raw per-request events are buffered and
  # flushed to local disk or S3 for later Athena debugging. Redis rollups
  # (admin_dashboard.rollups) remain aggregates-only.
  # history:
  #   backend: s3            # none | local | s3
  #   role: sidecar          # sidecar | global (baked into filenames)
  #   # instance_id: ""      # optional; else HISTORY_INSTANCE_ID / HOSTNAME
  #   streams: [cost, pii, usage, ratelimit]
  #   max_records: 1000
  #   max_bytes: 8388608
  #   max_age_seconds: 300   # 5-minute time chunk
  #   gzip: true
  #   local:                 # required when backend: local
  #     dir: logs/history
  #   s3:                    # required when backend: s3
  #     bucket: instawork-llm-proxy-history
  #     prefix: llm-proxy
  #     region: us-east-1
  #     # endpoint_url: http://localhost:4566  # MinIO/localstack

