    enabled: false # flip per-environment in configs/{staging,production}.yml

    default_limits:
      tokens_per_minute: 80_000
      requests_per_minute: 1_000
      tokens_per_hour: 4_800_000
      tokens_per_day: 115_200_000
      requests_per_day: 1_440_000
      burst_tokens: 8_000
      burst_requests: 100

