# Sidecar deployment profile (llm-proxy container co-located with an app).
# Set LLM_PROXY_CONFIG_PROFILE=sidecar alongside ENVIRONMENT=production (or
# staging) so deploy identity and infra settings stay on the env file while
# PII redaction and the admin dashboard HTTP server stay off here — observability
# redaction, POST /redact, and the dashboard UI run only on the central
# standalone llm-proxy service (not co-located app sidecars). BYO provider keys
# stay allowed here even though the standalone service rejects them.
#
# This file deep-merges over the environment file (e.g. production.yml), but the
# merge replaces whole nested blocks it names. So sidecars STILL write usage/cost/
# ratelimit/circuit rollups to the shared Redis (rollups are gated on
# rollups.enabled, not admin_dashboard.enabled) — but because we override the
# admin_dashboard block below, the rollups sub-block must be restated here. The
# standalone dashboard then reflects all sidecar traffic; we just don't serve the
# UI from here.
#
# Bedrock Mantle upstream auth is task-role SigV4. On the co-located sidecar we
# trust localhost/task networking, so callers need not present an iw-* Bedrock
# key (empty or a non-iw placeholder is accepted). Standalone llm-proxy keeps
# requiring a registered Bedrock-family proxy key.

enabled: true

providers:
  bedrock-mantle:
    auth: task_sigv4

features:
  byo_keys:
    enabled: true
  pii_redact:
    enabled: false
    allow_per_key_override: false
  redact_api:
    enabled: false
  id_gate:
    enabled: false
  admin_dashboard:
    # HTTP dashboard server off (UI served only by the standalone service)...
    enabled: false
    # ...but rollup WRITES stay on so sidecars publish usage/cost/ratelimit/
    # circuit aggregates to the shared Redis the standalone dashboard reads.
    # Must match the standalone (production.yml) Redis db so writes land on the
    # same keys. Set explicitly here because the deep-merge replaces the whole
    # admin_dashboard block rather than inheriting nested rollups.
    rollups:
      enabled: true
      redis:
        url: "${REDIS_URL}"
        db: 6
      retention_days: 90
      history_days: 30
  history:
    backend: none
    role: sidecar
