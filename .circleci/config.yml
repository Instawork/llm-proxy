version: 2.1

# Define orbs for easier configuration
orbs:
  go: circleci/go@3.0.1
  docker: circleci/docker@2.4.0

# Define reusable commands
commands:
  setup_go_environment:
    description: "Set up Go environment and dependencies"
    steps:
      - checkout
      - go/install:
          version: "1.24.5"
          cache-key: 'go-mod-{{ .Environment.CACHE_VERSION }}-{{ checksum "go.mod" }}'
      - run:
          name: Download dependencies
          command: make install
      - run:
          name: Install gofumpt
          command: go install mvdan.cc/gofumpt@latest

  setup_aws_and_docker:
    description: "Setup AWS CLI and Docker for ECR operations"
    steps:
      - run:
          name: Install AWS CLI
          command: |
            if ! command -v aws &> /dev/null; then
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip awscliv2.zip
              sudo ./aws/install
            fi
      - run:
          name: Login to AWS ECR
          command: |
            : "${AWS_ECR_REGISTRY_ID:?AWS_ECR_REGISTRY_ID must be set on the AWS CircleCI context}"
            AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-us-west-2}"
            aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" \
              | docker login --username AWS --password-stdin "${AWS_ECR_REGISTRY_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - run:
          name: Create ECR repository if it doesn't exist
          command: |
            AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-us-west-2}"
            AWS_ECR_REPOSITORY_NAME="${AWS_ECR_REPOSITORY_NAME:-llm-proxy}"
            aws ecr describe-repositories --region "${AWS_DEFAULT_REGION}" --repository-names "${AWS_ECR_REPOSITORY_NAME}" \
              || aws ecr create-repository --region "${AWS_DEFAULT_REGION}" --repository-name "${AWS_ECR_REPOSITORY_NAME}"

# Define jobs
jobs:
  lint:
    docker:
      - image: cimg/base:stable
    working_directory: ~/llm-proxy
    steps:
      - setup_go_environment
      - run:
          name: Run go vet
          command: go vet ./...
      - run:
          name: Run go fmt check
          command: |
            if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
              echo "Go code is not formatted:"
              gofmt -s -l .
              exit 1
            fi
      - run:
          name: Run gofumpt check
          command: |
            if [ "$(gofumpt -l . | wc -l)" -gt 0 ]; then
              echo "Go code is not formatted with gofumpt:"
              gofumpt -l .
              exit 1
            fi
      - run:
          name: Guard against raw body/chunk dumps in logs
          command: make lint-pii-logs

  unit-tests:
    docker:
      - image: cimg/base:stable
    working_directory: ~/llm-proxy
    steps:
      - setup_go_environment
      - run:
          name: Run config validator
          command: go run ./cmd/config-validator/
      - run:
          name: Run unit tests
          command: make test

  integration-tests:
    docker:
      - image: cimg/base:stable
    working_directory: ~/llm-proxy
    steps:
      - setup_go_environment
      - run:
          name: Run integration tests
          command: make test-integration

  fuzz-tests:
    # Machine executor (not the Docker executor): the fuzz CLI and the proxy
    # talk over http://localhost, and the proxy reaches redis/dynamodb on
    # published localhost ports. Containers started via setup_remote_docker
    # are NOT reachable on localhost, so a Linux VM is required.
    machine:
      image: ubuntu-2204:current
    working_directory: ~/llm-proxy
    steps:
      - checkout
      - go/install:
          version: "1.24.5"
          cache-key: 'go-mod-{{ .Environment.CACHE_VERSION }}-{{ checksum "go.mod" }}'
      - run:
          name: Download dependencies
          command: make install
      - run:
          name: Run fake-mode unit tests with race detector
          command: make fuzz-test
      - run:
          name: Start redis + dynamodb (published on localhost)
          command: docker compose up -d redis dynamodb
      - run:
          name: Resolve compose service hostnames to localhost
          # configs/fuzz.yml hardcodes the compose hostnames (redis:6379,
          # dynamodb:8000). The proxy runs on the host here, so point those
          # names at the published localhost ports instead of editing the YAML.
          command: echo "127.0.0.1 redis dynamodb" | sudo tee -a /etc/hosts
      - run:
          name: Build proxy binary
          command: make build
      - run:
          name: Start llm-proxy in fuzz (fake-upstream) mode
          command: |
            mkdir -p logs
            ENVIRONMENT=fuzz \
            LLM_PROXY_ALLOW_FAKE_MODE=1 \
            LLM_PROXY_ALLOW_TEST_MODE=1 \
            PORT=9002 \
            AWS_REGION=us-west-2 \
            AWS_DEFAULT_REGION=us-west-2 \
            AWS_ACCESS_KEY_ID=local \
            AWS_SECRET_ACCESS_KEY=local \
            AWS_ENDPOINT_URL=http://dynamodb:8000 \
            LLM_PROXY_ADMIN_SESSION_SECRET=ci-fuzz-session-secret \
              nohup ./bin/llm-proxy > logs/proxy.log 2>&1 &
            echo "started llm-proxy (pid $!)"
      - run:
          name: Wait for proxy /health
          command: |
            for i in $(seq 1 60); do
              if curl -sf http://localhost:9002/health > /dev/null; then
                echo "proxy healthy"; exit 0
              fi
              sleep 1
            done
            echo "proxy did not become healthy in time"; exit 1
      - run:
          name: Run fuzz-all (excluding Presidio-dependent PII scenarios)
          command: make fuzz-all-no-pii
      - run:
          name: Dump proxy + service logs on failure
          command: |
            echo "===== proxy log ====="; cat logs/proxy.log || true
            echo "===== redis/dynamodb ====="; docker compose logs --no-color redis dynamodb || true
          when: on_fail

  build-and-push:
    docker:
      - image: cimg/base:stable
    working_directory: ~/llm-proxy
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - setup_aws_and_docker
      - run:
          name: Build and push Docker image
          command: |
            # Get the short SHA for tagging
            export GIT_SHA=$(git rev-parse --short HEAD)
            echo "Building image with SHA: ${GIT_SHA}"
            ./scripts/build_for_ecr.sh -s ${GIT_SHA}
            # Save the SHA for the deployment job
            echo ${GIT_SHA} > /tmp/git_sha.txt
      - persist_to_workspace:
          root: /tmp
          paths:
            - git_sha.txt

  build-and-push-ocr:
    docker:
      - image: cimg/base:stable
    working_directory: ~/llm-proxy
    # Target the OCR repo for both the ensure-repo step and the build script.
    environment:
      AWS_ECR_REPOSITORY_NAME: ocr-gate
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - setup_aws_and_docker
      - run:
          name: Build and push OCR sidecar image
          command: |
            export GIT_SHA=$(git rev-parse --short HEAD)
            echo "Building OCR image with SHA: ${GIT_SHA}"
            # AWS login already done by setup_aws_and_docker; the OCR image has
            # its own build context and no .dockerignore to stage.
            ./scripts/build_for_ecr.sh -s ${GIT_SHA} \
              --repo ocr-gate \
              --dockerfile ocr_sidecar/Dockerfile \
              --context ocr_sidecar \
              --dockerignore "" \
              --skip-aws-setup

  deploy-prod:
    docker:
      - image: cimg/python:3.11.8
    steps:
      - checkout
      - add_ssh_keys
      - attach_workspace:
          at: /tmp
      - run:
          name: Install dependencies
          command: |
            pip install awscli
      - run:
          name: Deploy to production
          command: |
            export GIT_SHA=$(cat /tmp/git_sha.txt)
            echo "Deploying SHA: ${GIT_SHA} to production"
            ./scripts/deploy.sh production ${GIT_SHA}
      - run:
          name: Ping Slack Success
          command: |
            export GIT_SHA=$(cat /tmp/git_sha.txt)
            curl $SLACK_WEBHOOK_URL \
              -X POST \
              --data-urlencode "payload={\"text\": \":white_check_mark: *production* deployment of *llm-proxy* has successfully deployed with SHA \`$GIT_SHA\` - <https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/commit/${CIRCLE_SHA1}|View Commit>\"}"
          when: on_success
      - run:
          name: Ping Slack Failure
          command: |
            export GIT_SHA=$(cat /tmp/git_sha.txt)
            curl $SLACK_WEBHOOK_URL \
              -X POST \
              --data-urlencode "payload={\"text\": \":red_circle: *production* deployment of *llm-proxy* has failed for SHA \`$GIT_SHA\` - <https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/commit/${CIRCLE_SHA1}|View Commit>\"}"
          when: on_fail

  deploy-ocr-prod:
    docker:
      - image: cimg/python:3.11.8
    steps:
      - checkout
      - add_ssh_keys
      - run:
          name: Install dependencies
          command: pip install awscli
      - run:
          name: Deploy OCR gate to production
          command: |
            export GIT_SHA=$(git rev-parse --short HEAD)
            echo "Deploying OCR gate SHA: ${GIT_SHA} to production"
            ./scripts/deploy.sh production ${GIT_SHA} ocr-gate
      - run:
          name: Ping Slack Success
          command: |
            export GIT_SHA=$(git rev-parse --short HEAD)
            curl $SLACK_WEBHOOK_URL \
              -X POST \
              --data-urlencode "payload={\"text\": \":white_check_mark: *production* deployment of *ocr-gate* has successfully deployed with SHA \`$GIT_SHA\` - <https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/commit/${CIRCLE_SHA1}|View Commit>\"}"
          when: on_success
      - run:
          name: Ping Slack Failure
          command: |
            export GIT_SHA=$(git rev-parse --short HEAD)
            curl $SLACK_WEBHOOK_URL \
              -X POST \
              --data-urlencode "payload={\"text\": \":red_circle: *production* deployment of *ocr-gate* has failed for SHA \`$GIT_SHA\` - <https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/commit/${CIRCLE_SHA1}|View Commit>\"}"
          when: on_fail

# Define workflows
workflows:
  version: 2
  test-and-deploy:
    jobs:
      - lint:
          filters:
            branches:
              only: /.*/
            tags:
              only: /.*/

      - unit-tests:
          filters:
            branches:
              only: /.*/
            tags:
              only: /.*/

      - integration-tests:
          context:
            - LLMs
          filters:
            branches:
              only: /.*/
            tags:
              only: /.*/

      - fuzz-tests:
          filters:
            branches:
              only: /.*/
            tags:
              only: /.*/

      - build-and-push:
          requires:
            - lint
            - unit-tests
            - integration-tests
            - fuzz-tests
          filters:
            branches:
              only:
                - main
            tags:
              ignore: /.*/
          context:
            - AWS

      - build-and-push-ocr:
          requires:
            - lint
            - unit-tests
            - integration-tests
            - fuzz-tests
          filters:
            branches:
              only:
                - main
            tags:
              ignore: /.*/
          context:
            - AWS

      - deploy-prod-hold:
          type: approval
          requires:
            - build-and-push
          filters:
            branches:
              only: main

      - deploy-prod:
          requires:
            - deploy-prod-hold
          filters:
            branches:
              only: main
          context:
            - AWS
            - Slack

      - deploy-ocr-prod-hold:
          type: approval
          requires:
            - build-and-push-ocr
          filters:
            branches:
              only: main

      - deploy-ocr-prod:
          requires:
            - deploy-ocr-prod-hold
          filters:
            branches:
              only: main
          context:
            - AWS
            - Slack
